spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: email, profile
          github:
            client-id: ${GITHUB_CLIENT_ID:placeholder}
            client-secret: ${GITHUB_CLIENT_SECRET:placeholder}
            scope: user:email

server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        same-site: strict

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-please-change-in-prod-min-32chars}
  expiration-ms: 86400000
