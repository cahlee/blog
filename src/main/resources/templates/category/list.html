<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Categories - MyBlog</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">
                <i class="bi bi-pen-fill me-1"></i>MyBlog
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}"><i class="bi bi-house me-1"></i>Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/categories}">
                            <i class="bi bi-folder me-1"></i>Categories
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle me-1"></i>
                            <span sec:authentication="name">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" th:href="@{/profile}">Profile</a></li>
                            <li><hr class="dropdown-divider" /></li>
                            <li>
                                <form th:action="@{/logout}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="dropdown-item text-danger">Logout</button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <!-- Flash messages -->
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="card shadow-sm mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h4 class="mb-0"><i class="bi bi-folder me-1"></i>My Categories</h4>
                    </div>
                    <div class="card-body">
                        <!-- Create new category -->
                        <form th:action="@{/categories}" method="post" class="mb-4">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <div class="input-group">
                                <input type="text" name="name" class="form-control"
                                       placeholder="New category name" required maxlength="100" />
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-plus me-1"></i>Add
                                </button>
                            </div>
                        </form>

                        <div th:if="${#lists.isEmpty(categories)}" class="text-muted text-center py-3">
                            <i class="bi bi-folder-x display-6"></i>
                            <p class="mt-2">No categories yet. Create your first one above.</p>
                        </div>

                        <ul class="list-group" th:unless="${#lists.isEmpty(categories)}">
                            <li th:each="cat : ${categories}"
                                class="list-group-item d-flex justify-content-between align-items-center">
                                <span class="fw-semibold" th:text="${cat.name}"></span>
                                <div class="d-flex gap-1">
                                    <!-- Edit form (shown inline via collapse) -->
                                    <button class="btn btn-sm btn-outline-secondary"
                                            data-bs-toggle="collapse"
                                            th:data-bs-target="'#editCat' + ${cat.id}">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post"
                                          onsubmit="return confirm('Delete this category?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                    <a th:href="@{/(categoryId=${cat.id})}" class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                </div>
                            </li>
                            <!-- Edit collapse row -->
                            <li th:each="cat : ${categories}" class="list-group-item p-0">
                                <div class="collapse" th:id="'editCat' + ${cat.id}">
                                    <div class="p-2 bg-light">
                                        <form th:action="@{/categories/{id}/edit(id=${cat.id})}" method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                            <div class="input-group input-group-sm">
                                                <input type="text" name="name" class="form-control"
                                                       th:value="${cat.name}" required />
                                                <button type="submit" class="btn btn-success btn-sm">Save</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0 text-muted">&copy; 2025 MyBlog. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
