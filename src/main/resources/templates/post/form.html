<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${post != null} ? 'Edit Post - MyBlog' : 'New Post - MyBlog'">Post Form - MyBlog</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Toast UI Editor CSS -->
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">
                <i class="bi bi-pen-fill me-1"></i>MyBlog
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}"><i class="bi bi-house me-1"></i>Home</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle me-1"></i>
                            <span sec:authentication="name">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" th:href="@{/profile}">Profile</a></li>
                            <li><hr class="dropdown-divider" /></li>
                            <li>
                                <form th:action="@{/logout}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="dropdown-item text-danger">Logout</button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card shadow-sm">
                    <div class="card-header">
                        <h4 class="mb-0" th:text="${post != null} ? 'Edit Post' : 'Create New Post'">
                            Post Form
                        </h4>
                    </div>
                    <div class="card-body">
                        <form th:action="${post != null} ? @{/{username}/{id}/edit(username=${post.user.username},id=${post.id})} : @{/posts/new}"
                              th:object="${postForm}"
                              method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                            <!-- Validation errors -->
                            <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
                                <ul class="mb-0">
                                    <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
                                </ul>
                            </div>

                            <!-- Title -->
                            <div class="mb-3">
                                <label for="title" class="form-label fw-semibold">
                                    Title <span class="text-danger">*</span>
                                </label>
                                <input type="text" id="title" th:field="*{title}"
                                       class="form-control form-control-lg"
                                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                                       placeholder="Enter post title" />
                                <div th:if="${#fields.hasErrors('title')}" class="invalid-feedback">
                                    <span th:errors="*{title}"></span>
                                </div>
                            </div>

                            <!-- Category and visibility row -->
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="categoryId" class="form-label fw-semibold">Category</label>
                                    <select id="categoryId" th:field="*{categoryId}" class="form-select">
                                        <option value="">-- No Category --</option>
                                        <option th:each="cat : ${categories}"
                                                th:value="${cat.id}"
                                                th:text="${cat.name}">
                                        </option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Visibility</label>
                                    <div class="form-check mt-2">
                                        <input class="form-check-input" type="checkbox"
                                               id="isPublic" th:field="*{publicPost}" />
                                        <label class="form-check-label" for="isPublic">
                                            Public post (visible to everyone)
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <!-- Tags -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Tags</label>
                                <input type="text" id="tagsInput" class="form-control"
                                       placeholder="Enter tags separated by commas (e.g. java, spring, backend)" />
                                <!-- Hidden inputs for tags will be generated by JS -->
                                <div id="tagsContainer"></div>
                                <small class="text-muted">Tags will be created if they don't exist.</small>
                            </div>

                            <!-- Hidden content field for Toast UI -->
                            <input type="hidden" id="content" th:field="*{content}" />
                            <div th:if="${#fields.hasErrors('content')}" class="text-danger small mb-1">
                                <span th:errors="*{content}"></span>
                            </div>

                            <!-- Toast UI Editor -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Content <span class="text-danger">*</span></label>
                                <div id="editor"></div>
                            </div>

                            <!-- Form buttons -->
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-save me-1"></i>
                                    <span th:text="${post != null} ? 'Update Post' : 'Publish Post'">Save</span>
                                </button>
                                <a th:href="${post != null} ? @{/{username}/{id}(username=${post.user.username},id=${post.id})} : @{/}"
                                   class="btn btn-outline-secondary">
                                    Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0 text-muted">&copy; 2025 MyBlog. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Toast UI Editor JS -->
    <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>

    <script th:inline="javascript">
        // Initialize tags from existing post
        const existingTags = /*[[${postForm.tags}]]*/ [];
        const tagsInput = document.getElementById('tagsInput');
        const tagsContainer = document.getElementById('tagsContainer');

        if (existingTags && existingTags.length > 0) {
            tagsInput.value = existingTags.join(', ');
        }

        // Initialize Toast UI Editor
        const editor = new toastui.Editor({
            el: document.querySelector('#editor'),
            height: '500px',
            initialEditType: 'markdown',
            previewStyle: 'vertical',
            initialValue: /*[[${postForm.content ?: ''}]]*/ '',
            hooks: {
                addImageBlobHook: async (blob, callback) => {
                    const formData = new FormData();
                    formData.append('file', blob);
                    try {
                        const res = await fetch('/api/images/upload', {
                            method: 'POST',
                            body: formData
                        });
                        const data = await res.json();
                        if (data.url) {
                            callback(data.url, 'image');
                        } else {
                            alert('Image upload failed: ' + (data.error || 'Unknown error'));
                        }
                    } catch (e) {
                        alert('Image upload failed: ' + e.message);
                    }
                }
            },
            events: {
                change: () => {
                    document.querySelector('#content').value = editor.getMarkdown();
                }
            }
        });

        // On form submit: write editor content to hidden field and process tags
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();

            // Set markdown content
            document.querySelector('#content').value = editor.getMarkdown();

            // Process tags
            const tagStr = tagsInput.value.trim();
            tagsContainer.innerHTML = '';

            if (tagStr) {
                const tagList = tagStr.split(',').map(t => t.trim()).filter(t => t.length > 0);
                tagList.forEach(tag => {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = 'tags';
                    input.value = tag;
                    tagsContainer.appendChild(input);
                });
            }

            this.submit();
        });
    </script>
</body>
</html>
