<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${post.title} + ' - MyBlog'">Post - MyBlog</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">
                <i class="bi bi-pen-fill me-1"></i>MyBlog
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}"><i class="bi bi-house me-1"></i>Home</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/posts/new}"><i class="bi bi-plus-circle me-1"></i>New Post</a>
                    </li>
                </ul>
                <form class="d-flex me-3" th:action="@{/posts/search}" method="get">
                    <div class="input-group">
                        <input class="form-control form-control-sm" type="search" name="q" placeholder="Search posts..." />
                        <button class="btn btn-outline-light btn-sm" type="submit"><i class="bi bi-search"></i></button>
                    </div>
                </form>
                <ul class="navbar-nav">
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/auth/login}">Login</a>
                    </li>
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle me-1"></i>
                            <span sec:authentication="name">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" th:href="@{/profile}">Profile</a></li>
                            <li><hr class="dropdown-divider" /></li>
                            <li>
                                <form th:action="@{/logout}" method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="dropdown-item text-danger">Logout</button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${commentError}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${commentError}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-9">
                <!-- Post header -->
                <article>
                    <div class="mb-3">
                        <a th:href="@{/}" class="text-muted text-decoration-none small">
                            <i class="bi bi-arrow-left me-1"></i>Back to posts
                        </a>
                    </div>
                    <h1 class="fw-bold mb-2" th:text="${post.title}"></h1>

                    <div class="d-flex flex-wrap align-items-center gap-3 text-muted small mb-3">
                        <span>
                            <i class="bi bi-person me-1"></i>
                            <span th:text="${post.authorName}"></span>
                        </span>
                        <span th:if="${post.categoryName}">
                            <i class="bi bi-folder me-1"></i>
                            <span th:text="${post.categoryName}"></span>
                        </span>
                        <span>
                            <i class="bi bi-calendar me-1"></i>
                            <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                        </span>
                        <span>
                            <i class="bi bi-eye me-1"></i>
                            <span th:text="${post.viewCount}"></span> views
                        </span>
                        <span th:unless="${post.public}" class="badge bg-secondary">
                            <i class="bi bi-lock-fill"></i> Private
                        </span>
                    </div>

                    <!-- Tags -->
                    <div th:if="${!#sets.isEmpty(post.tags)}" class="mb-3">
                        <a th:each="tag : ${post.tags}"
                           th:href="@{/posts/search(q=${tag})}"
                           th:text="'#' + ${tag}"
                           class="badge bg-secondary text-decoration-none me-1">
                        </a>
                    </div>

                    <!-- Author actions -->
                    <div class="d-flex gap-2 mb-4" th:if="${currentUserId != null && currentUserId == post.authorId}">
                        <a th:href="@{/{username}/{id}/edit(username=${post.authorName},id=${post.id})}" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-pencil me-1"></i>Edit
                        </a>
                        <form th:action="@{/{username}/{id}/delete(username=${post.authorName},id=${post.id})}" method="post"
                              onsubmit="return confirm('Are you sure you want to delete this post?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash me-1"></i>Delete
                            </button>
                        </form>
                    </div>

                    <hr />

                    <!-- Rendered markdown content -->
                    <div class="post-content" th:utext="${post.renderedContent}"></div>
                </article>

                <hr class="my-4" />

                <!-- Comments section -->
                <section id="comments">
                    <h4 class="mb-3">
                        <i class="bi bi-chat-dots me-1"></i>Comments
                        <span class="badge bg-secondary" th:text="${#lists.size(comments)}">0</span>
                    </h4>

                    <!-- Comment list -->
                    <div th:if="${#lists.isEmpty(comments)}" class="text-muted mb-4">
                        No comments yet. Be the first to comment!
                    </div>

                    <div th:each="comment : ${comments}" class="card mb-2" th:classappend="${comment.deleted} ? 'border-light' : ''">
                        <div class="card-body py-2">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <strong th:if="${!comment.deleted}">
                                        <i th:if="${comment.guest}" class="bi bi-person-dash me-1"></i>
                                        <i th:unless="${comment.guest}" class="bi bi-person-check me-1"></i>
                                        <span th:text="${comment.authorName}"></span>
                                        <span th:if="${comment.guest}" class="badge bg-light text-muted ms-1 small">Guest</span>
                                    </strong>
                                    <small class="text-muted ms-2"
                                           th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">
                                    </small>
                                </div>

                                <!-- Delete button for logged-in user's own comment -->
                                <div th:if="${!comment.deleted && currentUserId != null && currentUserId == comment.userId}">
                                    <form th:action="@{/{username}/{pid}/comments/{cid}/delete(username=${post.authorName},pid=${post.id},cid=${comment.id})}"
                                          method="post"
                                          onsubmit="return confirm('Delete this comment?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </div>

                                <!-- Delete button for guest comment -->
                                <div th:if="${!comment.deleted && comment.guest}">
                                    <button class="btn btn-sm btn-outline-secondary"
                                            data-bs-toggle="collapse"
                                            th:data-bs-target="'#deleteGuest' + ${comment.id}">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                    <div class="collapse mt-1" th:id="'deleteGuest' + ${comment.id}">
                                        <form th:action="@{/{username}/{pid}/comments/{cid}/delete(username=${post.authorName},pid=${post.id},cid=${comment.id})}"
                                              method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                            <div class="input-group input-group-sm">
                                                <input type="password" name="guestPassword"
                                                       class="form-control" placeholder="Enter password" />
                                                <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                            <p class="mb-0 mt-1" th:text="${comment.content}"
                               th:classappend="${comment.deleted} ? 'text-muted fst-italic' : ''">
                            </p>
                        </div>
                    </div>

                    <!-- Add comment form -->
                    <div class="card mt-4">
                        <div class="card-header">
                            <h6 class="mb-0">Leave a Comment</h6>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/{username}/{id}/comments(username=${post.authorName},id=${post.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                                <!-- Guest fields shown only if not authenticated -->
                                <div sec:authorize="isAnonymous()">
                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <label class="form-label">Name <span class="text-danger">*</span></label>
                                            <input type="text" name="guestName" class="form-control"
                                                   placeholder="Your name" required />
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Password <span class="text-danger">*</span></label>
                                            <input type="password" name="guestPassword" class="form-control"
                                                   placeholder="To delete your comment later" required />
                                        </div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Comment <span class="text-danger">*</span></label>
                                    <textarea name="content" class="form-control" rows="4"
                                              placeholder="Write your comment..." required maxlength="1000"></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-send me-1"></i>Submit
                                </button>
                            </form>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0 text-muted">&copy; 2025 MyBlog. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
