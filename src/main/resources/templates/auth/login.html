<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Blog</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
        body { background-color: #f8f9fa; }
        .login-card { max-width: 440px; }
        .social-btn { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .divider { position: relative; text-align: center; margin: 1.5rem 0; }
        .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #dee2e6; }
        .divider span { background: white; padding: 0 1rem; position: relative; color: #6c757d; font-size: 0.875rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">
                <i class="bi bi-pen-fill me-1"></i>Blog
            </a>
        </div>
    </nav>

    <div class="container d-flex justify-content-center align-items-start py-5">
        <div class="login-card w-100">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="text-center fw-bold mb-1">Welcome back</h2>
                    <p class="text-center text-muted mb-4">Sign in to your account</p>

                    <!-- Error messages -->
                    <div th:if="${error}" class="alert alert-danger">
                        <i class="bi bi-exclamation-circle me-1"></i>
                        <span th:text="${error}">Invalid credentials.</span>
                    </div>
                    <div th:if="${param.error}" class="alert alert-danger" th:unless="${error}">
                        <i class="bi bi-exclamation-circle me-1"></i>
                        Invalid email or password.
                    </div>
                    <div th:if="${success}" class="alert alert-success">
                        <i class="bi bi-check-circle me-1"></i>
                        <span th:text="${success}"></span>
                    </div>

                    <!-- Login form -->
                    <form th:action="@{/login}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="mb-3">
                            <label for="username" class="form-label">Email address</label>
                            <input type="email" id="username" name="username"
                                   class="form-control" placeholder="you@example.com"
                                   autocomplete="email" required />
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" name="password"
                                   class="form-control" placeholder="Your password"
                                   autocomplete="current-password" required />
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-2">
                            <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
                        </button>
                    </form>

                    <!-- Divider -->
                    <div class="divider"><span>or continue with</span></div>

                    <!-- Social login buttons -->
                    <div class="d-grid gap-2">
                        <a th:href="@{/oauth2/authorization/google}"
                           class="btn btn-outline-danger social-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                            </svg>
                            Sign in with Google
                        </a>
                        <a th:href="@{/oauth2/authorization/github}"
                           class="btn btn-outline-dark social-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
                            </svg>
                            Sign in with GitHub
                        </a>
                    </div>

                    <hr class="my-3" />

                    <p class="text-center mb-0">
                        Don't have an account?
                        <a th:href="@{/auth/register}" class="text-decoration-none">Register</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
