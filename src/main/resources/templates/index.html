<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${blogOwner != null} ? |${blogOwner}'s Blog - MyBlog| : 'MyBlog - Home'">MyBlog - Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">
                <i class="bi bi-pen-fill me-1"></i>MyBlog
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/}"><i class="bi bi-house me-1"></i>Home</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/posts/new}"><i class="bi bi-plus-circle me-1"></i>New Post</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/categories}"><i class="bi bi-folder me-1"></i>Categories</a>
                    </li>
                </ul>
                <form class="d-flex me-3" th:action="@{/posts/search}" method="get">
                    <div class="input-group">
                        <input class="form-control form-control-sm" type="search" name="q"
                               th:value="${query}" placeholder="Search posts..." />
                        <button class="btn btn-outline-light btn-sm" type="submit">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>
                <ul class="navbar-nav">
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/auth/login}"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="btn btn-outline-light btn-sm ms-1" th:href="@{/auth/register}">Register</a>
                    </li>
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle me-1"></i>
                            <span sec:authentication="name">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" th:href="@{/profile}"><i class="bi bi-person me-1"></i>Profile</a></li>
                            <li><hr class="dropdown-divider" /></li>
                            <li>
                                <form th:action="@{/logout}" method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="dropdown-item text-danger">
                                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- User blog banner -->
    <div th:if="${blogOwner != null}" class="bg-light border-bottom py-3">
        <div class="container">
            <h4 class="mb-0">
                <i class="bi bi-person-circle me-2"></i>
                <span th:text="${blogOwner}">username</span>'s Blog
            </h4>
        </div>
    </div>

    <!-- Flash messages -->
    <div class="container mt-3">
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    </div>

    <main class="container mt-4">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-lg-3 mb-4">
                <!-- Category filter -->
                <div class="card mb-3" sec:authorize="isAuthenticated()">
                    <div class="card-header">
                        <h6 class="mb-0"><i class="bi bi-folder me-1"></i>Categories</h6>
                    </div>
                    <div class="list-group list-group-flush">
                        <a th:href="@{/}" class="list-group-item list-group-item-action"
                           th:classappend="${selectedCategoryId == null} ? 'active' : ''">
                            All Posts
                        </a>
                        <a th:each="cat : ${categories}"
                           th:href="@{/(categoryId=${cat.id})}"
                           th:text="${cat.name}"
                           class="list-group-item list-group-item-action"
                           th:classappend="${selectedCategoryId == cat.id} ? 'active' : ''">
                        </a>
                    </div>
                </div>

                <!-- Tag cloud -->
                <div class="card" th:if="${!#lists.isEmpty(tags)}">
                    <div class="card-header">
                        <h6 class="mb-0"><i class="bi bi-tags me-1"></i>Tags</h6>
                    </div>
                    <div class="card-body">
                        <span th:each="tag : ${tags}">
                            <a th:href="@{/posts/search(q=${tag.name})}"
                               th:text="'#' + ${tag.name}"
                               class="badge bg-secondary text-decoration-none me-1 mb-1">
                            </a>
                        </span>
                    </div>
                </div>
            </div>

            <!-- Post list -->
            <div class="col-lg-9">
                <div th:if="${query != null && !query.isBlank()}" class="mb-3">
                    <h5>Search results for: <strong th:text="${query}"></strong></h5>
                    <a th:href="@{/}" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-x me-1"></i>Clear search
                    </a>
                </div>

                <div th:if="${posts.isEmpty()}" class="text-center py-5 text-muted">
                    <i class="bi bi-inbox display-4"></i>
                    <p class="mt-2">No posts found.</p>
                    <a sec:authorize="isAuthenticated()" th:href="@{/posts/new}" class="btn btn-primary">
                        Write your first post
                    </a>
                </div>

                <div th:each="post : ${posts}" class="card mb-3 shadow-sm post-card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <h5 class="card-title">
                                <a th:href="@{/{username}/{id}(username=${post.authorName},id=${post.id})}"
                                   th:text="${post.title}"
                                   class="text-decoration-none text-dark post-title">
                                </a>
                                <span th:unless="${post.public}" class="badge bg-secondary ms-1">
                                    <i class="bi bi-lock-fill"></i> Private
                                </span>
                            </h5>
                            <small class="text-muted text-nowrap ms-2">
                                <i class="bi bi-eye me-1"></i>
                                <span th:text="${post.viewCount}">0</span>
                            </small>
                        </div>
                        <p class="card-text text-muted small">
                            <i class="bi bi-person me-1"></i>
                            <span th:text="${post.authorName}">Author</span>
                            <span th:if="${post.categoryName}" class="ms-2">
                                <i class="bi bi-folder me-1"></i>
                                <span th:text="${post.categoryName}"></span>
                            </span>
                            <span class="ms-2">
                                <i class="bi bi-clock me-1"></i>
                                <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}"></span>
                            </span>
                        </p>
                        <div th:if="${!#sets.isEmpty(post.tags)}">
                            <a th:each="tag : ${post.tags}"
                               th:href="@{/posts/search(q=${tag})}"
                               th:text="'#' + ${tag}"
                               class="badge bg-light text-secondary text-decoration-none me-1">
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Pagination -->
                <nav th:if="${posts.totalPages > 1}" aria-label="Page navigation">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${posts.first} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/(page=${posts.number - 1}, categoryId=${selectedCategoryId})}">
                                &laquo; Prev
                            </a>
                        </li>
                        <li th:each="i : ${#numbers.sequence(0, posts.totalPages - 1)}"
                            class="page-item"
                            th:classappend="${i == posts.number} ? 'active'">
                            <a class="page-link"
                               th:href="@{/(page=${i}, categoryId=${selectedCategoryId})}"
                               th:text="${i + 1}">
                            </a>
                        </li>
                        <li class="page-item" th:classappend="${posts.last} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/(page=${posts.number + 1}, categoryId=${selectedCategoryId})}">
                                Next &raquo;
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0 text-muted">&copy; 2025 MyBlog. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
